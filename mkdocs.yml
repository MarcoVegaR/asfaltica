site_name: Boilerplate Laravel
site_description: Documentación técnica del boilerplate Laravel/Inertia
site_url: https://marcovegar.github.io/boilerplate-laravel13/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MarcoVegaR/boilerplate-laravel13
      name: Repositorio en GitHub

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search

nav:
  - Inicio: index.md
  - Primeros pasos: getting-started.md
  - Arquitectura:
      - Índice: architecture/index.md
      - Autorización: authorization.md
      - Guía CRUD: crud-module-guide.md
  - Desarrollo:
      - Índice: development/index.md
  - Operaciones:
      - Índice: operations/index.md
      - Guía de operabilidad: operability-guide.md
  - Referencia:
      - Índice: reference/index.md
  - ADR:
      - Índice: adr/index.md
      - ADR-005 Audit Boundary: adr/ADR-005-audit-boundary.md
      - ADR-007 Logging and Correlation: adr/ADR-007-logging-and-correlation.md
      - ADR-008 Queue and Scheduler Policy: adr/ADR-008-queue-and-scheduler-policy.md
      - ADR-009 CRUD Module Standard: adr/ADR-009-crud-module-standard.md
      - ADR-011 Copilot Backend Audit: adr/ADR-011-copilot-backend-audit.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
